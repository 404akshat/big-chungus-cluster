apiVersion: apps/v1
kind: Deployment
metadata:
 name: bcc-api-deployment
 labels:
  app: bcc-api
spec:
 replicas: 2
 selector:
  matchLabels:
   app: bcc-api
 template:
  metadata:
   labels:
    app: bcc-api
  spec:
   containers:
   - name: bcc-api-server
     image: bcc-api:v1.0.0
     imagePullPolicy: Never
     ports:
     - containerPort: 8080
